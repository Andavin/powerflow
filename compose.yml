# Powerflow web app — overlay for the main span-stats compose.
#
# Run merged with the main file so it shares the `span` network and can reach
# QuestDB by service name:
#
#   docker compose -f compose.yml -f compose.web-app.yml up -d --build
#
# (Designed to fold into compose.yml later.) Secrets come from ./.env.

services:
  powerflow:
    build: span-web-app
    image: powerflow:latest
    restart: unless-stopped
    ports:
      - "3007:3000"
    env_file:
      - .env
    environment:
      POWERFLOW_DATA_MODE: live
      # Same hostname the collector uses (see collector/config.yml).
      QUESTDB_URL: http://localhost:9000
      POWERFLOW_AUTH_DISABLED: "0"
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - span

networks:
  span:
