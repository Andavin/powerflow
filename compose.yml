services:
  powerflow:
    build: .
    image: powerflow:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      POWERFLOW_DATA_MODE: live
      # Reachable as the service name on the shared span compose network.
      QUESTDB_URL: ${QUESTDB_URL:-http://questdb:9000}
      POWERFLOW_TIMEZONE: ${POWERFLOW_TIMEZONE:-America/Denver}
      POWERFLOW_DEVICE_ID: ${POWERFLOW_DEVICE_ID:-}
      # Auth (the app is intended to be internet-exposed — set strong values).
      POWERFLOW_PASSWORD: ${POWERFLOW_PASSWORD:?set a login password}
      POWERFLOW_SESSION_SECRET: ${POWERFLOW_SESSION_SECRET:?set a long random secret}
      POWERFLOW_AUTH_DISABLED: "0"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - span

networks:
  # Join the existing span-stats network so `questdb` resolves. Override the
  # external name to match your environment, e.g. `data_span` or `span-stats_span`:
  #   SPAN_NETWORK=data_span docker compose up -d
  span:
    external: true
    name: ${SPAN_NETWORK:-data_span}
