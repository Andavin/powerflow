# Powerflow — full stack: QuestDB + collector + web app.
#
# Every image is pulled from a registry (GHCR / Docker Hub); nothing is built
# locally. Configuration is the shared ./config/config.yml, mounted read-only
# into both apps at /config/config.yml, with ./.env supplying compose settings
# (image tags, host port, panel host/IP) and overriding individual config keys.
#
# First run:
#   cp .env.example .env                              # image tags, PANEL_HOST/IP
#   cp config/config.example.yml config/config.yml    # panel + questdb + app config
#   #  ...place the panel's CA at config/ca.pem...
#   docker compose pull
#   docker compose up -d
#
# The panel's MQTT broker is reached by hostname so its TLS cert validates;
# extra_hosts maps that hostname (PANEL_HOST, matching mqtt.server in
# config.yml) to the panel's LAN IP (PANEL_IP) inside the containers.

services:
  questdb:
    image: questdb/questdb:${QUESTDB_TAG:-latest}
    restart: unless-stopped
    ports:
      # Web console + HTTP API on the host (handy for debugging / the console).
      - "${QUESTDB_HTTP_PORT:-9000}:9000"
    volumes:
      # A named volume by default; set QUESTDB_DATA to an absolute host path to
      # store the data elsewhere (e.g. /mnt/storage/data/span).
      - "${QUESTDB_DATA:-questdb-data}:/var/lib/questdb"
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    environment:
      - QDB_LINE_TCP_MAINTENANCE_JOB_INTERVAL=60000
      - QDB_PG_ENABLED=true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/exec?query=SELECT%201 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - span

  powerflow-collector:
    image: ghcr.io/andavin/powerflow-collector:${COLLECTOR_TAG:-latest}
    restart: unless-stopped
    depends_on:
      questdb:
        condition: service_healthy
    volumes:
      # Shared config.yml + ca.pem. Read-only: the collector only reads them.
      - ./config:/config:ro
    env_file:
      # Optional overrides for config.yml (SPAN_*). Absent on a fresh checkout.
      - path: .env
        required: false
    extra_hosts:
      - "${PANEL_HOST:?set PANEL_HOST in .env}:${PANEL_IP:?set PANEL_IP in .env}"
    # Persist and rotate logs so `docker logs` is always available (and can't
    # balloon on a crash-loop).
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - span

  powerflow:
    image: ghcr.io/andavin/powerflow:${POWERFLOW_TAG:-latest}
    restart: unless-stopped
    depends_on:
      questdb:
        condition: service_healthy
    ports:
      # host:container — the app listens on 3000 inside the container.
      - "${POWERFLOW_PORT:-3007}:3000"
    volumes:
      # Same shared config.yml + ca.pem the collector uses.
      - ./config:/config:ro
    env_file:
      - path: .env
        required: false
    environment:
      # In-stack, always reach QuestDB over the compose network. Set here (not
      # in config.yml) because the host/port differ from the collector's view
      # only in that both resolve `questdb` on this network; `environment`
      # also wins over any QUESTDB_URL left in .env.
      QUESTDB_URL: http://questdb:9000
    extra_hosts:
      - "${PANEL_HOST:?set PANEL_HOST in .env}:${PANEL_IP:?set PANEL_IP in .env}"
    healthcheck:
      # /api/health is public (no auth) and always 200 when the server is up.
      test:
        - CMD-SHELL
        - node -e "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - span

volumes:
  questdb-data:

networks:
  span:
