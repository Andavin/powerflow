name: Collector CI

# Build, vet, and race-test the Go collector. Scoped to collector/** so it only
# runs when the collector changes (the web app has its own workflows). Actions
# are pinned to commit SHAs — matching this repo's other workflows — and kept
# current by Dependabot (.github/dependabot.yml).

on:
  push:
    branches: [main]
    paths:
      - "collector/**"
      - ".github/workflows/collector-ci.yml"
  pull_request:
    paths:
      - "collector/**"
      - ".github/workflows/collector-ci.yml"

defaults:
  run:
    working-directory: collector

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.24"
          # Relative to the repo root, not the working-directory above.
          cache-dependency-path: collector/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...
