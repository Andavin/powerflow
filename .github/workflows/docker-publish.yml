name: Publish Docker image

# Build the Powerflow image and publish it to GitHub Container Registry.
#
# Versioning is driven by package.json's "version" field — the single source
# of truth — not by git tags, so the image version can never drift from the
# app version:
#   - push to main   -> :<version>, :<major.minor>, :latest, :edge, :sha-<short>
#   - pull request    -> build only (no push); validates the Dockerfile
#
# To release: bump "version" in package.json and merge to main. The immutable
# per-commit :sha-<short> tag always pins an exact build; the :<version> and
# :latest tags float to the newest build of that version.
#
# Actions are pinned to commit SHAs (with the human-readable version alongside)
# for supply-chain integrity; Dependabot keeps them current (.github/dependabot.yml).

on:
  push:
    branches: [main]
    # The Go collector lives in collector/ with its own CI; a collector-only
    # change shouldn't rebuild the web image.
    paths-ignore:
      - "collector/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "collector/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

concurrency:
  # Don't let two pushes to the same ref build/push on top of each other.
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Needed to publish a signed build-provenance attestation.
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # GHCR requires a lowercase image path; the owner (Andavin) isn't.
      - name: Compute image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      # package.json is the source of truth for the version tag.
      - name: Read version from package.json
        id: ver
        run: |
          v=$(jq -r .version package.json)
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "minor=${v%.*}" >> "$GITHUB_OUTPUT"

      # QEMU is only needed for the emulated arm64 build, which we skip on PRs.
      - name: Set up QEMU
        if: github.event_name != 'pull_request'
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Skip login on pull requests: forks can't read the token's packages
      # scope, and PRs only build (never push) anyway.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags and labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }},enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=${{ steps.ver.outputs.minor }},enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
            type=edge,branch=main
            type=ref,event=pr
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=Powerflow
            org.opencontainers.image.description=Real-time energy dashboard for a home power panel
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          # Multi-arch only for real pushes/releases. On PRs we just validate
          # the build, so skip the slow emulated arm64 pass.
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Reuse layers across runs to keep rebuilds fast.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Provenance is attached below via actions/attest-build-provenance (a
          # signed Sigstore attestation). Disable BuildKit's own inline
          # provenance so the pushed index stays a clean multi-arch manifest
          # without "unknown/unknown" entries.
          provenance: false

      # GitHub-native signed attestation linking the image digest to this run.
      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
