version: 2
updates:
  # Keep the web app's npm (pnpm) dependencies current. Without this the whole
  # JS tree drifts unmonitored — including security patches like the Next.js
  # bump that carried the postcss < 8.5.10 fix.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    groups:
      # One PR for all minor/patch bumps; majors still come through singly.
      npm-minor:
        update-types: ["minor", "patch"]

  # Keep the SHA-pinned GitHub Actions current. Dependabot bumps the pin and
  # updates the trailing "# vX.Y.Z" comment so the pins don't silently rot.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      # One PR for all action bumps rather than one per action.
      actions:
        patterns: ["*"]

  # Keep the Go collector's module dependencies current (it lives in a
  # subdirectory now, so it needs its own gomod entry).
  - package-ecosystem: gomod
    directory: /collector
    schedule:
      interval: weekly
    commit-message:
      prefix: collector
    groups:
      go:
        patterns: ["*"]
