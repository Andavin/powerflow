version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current. Dependabot bumps the pin and
  # updates the trailing "# vX.Y.Z" comment so the pins don't silently rot.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      # One PR for all action bumps rather than one per action.
      actions:
        patterns: ["*"]

  # Keep the Go collector's module dependencies current (it lives in a
  # subdirectory now, so it needs its own gomod entry).
  - package-ecosystem: gomod
    directory: /collector
    schedule:
      interval: weekly
    commit-message:
      prefix: collector
    groups:
      go:
        patterns: ["*"]
