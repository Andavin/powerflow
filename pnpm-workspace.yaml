# Standalone project (not part of the parent span-monitor workspace).
# Explicitly allow build scripts for the native deps that need them.
allowBuilds:
  "@tailwindcss/oxide": true
  esbuild: true
  sharp: true
  unrs-resolver: true

# Force the postcss copy Next still bundles (8.4.31) past GHSA-qx2v-qp2m-jg93
# (XSS in the CSS stringifier). Drop this once Next repins postcss >= 8.5.10.
overrides:
  "postcss@<8.5.10": ">=8.5.16"
